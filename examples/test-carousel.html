<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Carousel</title>
    <style>
        body { margin: 0; padding: 20px; background: #e2e8f0; font-family: system-ui, sans-serif; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .slide { width: 1080px; height: 1080px; background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; box-sizing: border-box; text-align: center; }
        h1 { font-size: 80px; color: #0f172a; margin: 0 0 40px 0; }
        p { font-size: 40px; color: #64748b; margin: 0; }
        .slide-1 { background: linear-gradient(135deg, #f0f9ff, #e0f2fe); border: 20px solid #38bdf8; }
        .slide-2 { background: linear-gradient(135deg, #fdf4ff, #fae8ff); border: 20px solid #e879f9; }
        .slide-3 { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border: 20px solid #4ade80; }
        .slide-4 { background: linear-gradient(135deg, #fff7ed, #ffedd5); border: 20px solid #fb923c; }
        .slide-5 { background: linear-gradient(135deg, #fef2f2, #fee2e2); border: 20px solid #f87171; }
        .slide-6 { background: linear-gradient(135deg, #f5f3ff, #ede9fe); border: 20px solid #a78bfa; }
        .slide-7 { background: linear-gradient(135deg, #f8fafc, #f1f5f9); border: 20px solid #94a3b8; }
    </style>
</head>
<body>
    <div class="slide slide-1">
        <h1>Welcome to Slice</h1>
        <p>Drop this file to test it!</p>
    </div>
    <div class="slide slide-2">
        <h1>High Quality</h1>
        <p>Export at 2x Retina resolution</p>
    </div>
    <div class="slide slide-3">
        <h1>Lightning Fast</h1>
        <p>Powered by Next.js and Playwright</p>
    </div>
    <div class="slide slide-4">
        <h1>Single File</h1>
        <p>Or zip files with assets</p>
    </div>
    <div class="slide slide-5">
        <h1>Secure</h1>
        <p>Server-side rendering</p>
    </div>
    <div class="slide slide-6">
        <h1>Batch Export</h1>
        <p>Get a neat ZIP file</p>
    </div>
    <div class="slide slide-7">
        <h1>Ready to Post</h1>
        <p>Instagram ready formats</p>
    </div>
</body>
</html>
